<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Candle Conditions Monitor</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body { background: #f8f9fa; padding: 20px; font-family: Arial, sans-serif; }
        h1 { margin-bottom: 30px; }
        .strategy-table { margin-bottom: 40px; }
        .strategy-title {
            font-size: 1.4rem;
            font-weight: bold;
            background: #343a40;
            color: white;
            padding: 12px 20px;
            border-radius: 8px 8px 0 0;
            text-align: center;
        }
        table { background: white; }
        th { background: #e9ecef; text-align: center; }
        .ticker-cell { font-weight: bold; text-align: center; background: #f1f3f5; }
        .state-ready { color: #d39e00; font-weight: bold; }
        .state-fired { color: #28a745; font-weight: bold; }
        .state-not-met { color: #dc3545; font-weight: bold; }
        .na { color: #6c757d; font-style: italic; }
        .ticker-row:hover { background-color: #f0f8ff; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <h1 class="text-center">Candle Conditions Monitor</h1>
        <div id="conditions-container">
            <p class="text-center text-muted"><em>Loading data...</em></p>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script>
        //const socket = io('http://127.0.0.1:5001', {
            //path: '/socket.io',
            //transports: ['websocket']
        //});

        const socket = io({
            path: '/socket.io',
            transports: ['polling'] });

        socket.on('connect', () => {
            console.log('Connected – requesting candle conditions');
            socket.emit('request_candle_conditions');
        });

        socket.on('connect_error', (err) => {
            console.error('Socket connect error:', err.message);
        });

        // Listen for server push to refresh
        socket.on('request_candle_conditions', () => {
            console.log('Server requested refresh — fetching latest candle data');
            socket.emit('request_candle_conditions');
        });
        
        socket.on('candle_conditions_update', function(msg) {
            console.log('RECEIVED candle_conditions_update:', msg);  // <-- ADD THIS
            const data = msg.data || {};
            const tickerStrategies = msg.ticker_strategies || {};
            console.log('Data keys:', Object.keys(data));  // <-- ADD THIS
            console.log('Ticker strategies:', tickerStrategies);

            const container = $('#conditions-container');
            container.empty();

            if (Object.keys(data).length === 0 || Object.keys(tickerStrategies).length === 0) {
                container.append('<p class="text-center text-muted">No active tickers or strategies enabled.</p>');
                return;
            }

            // Get all unique selected strategies across all tickers
            const allSelectedStrategies = new Set();
            Object.values(tickerStrategies).forEach(strats => {
               strats.forEach(s => allSelectedStrategies.add(s));
            });

            if (allSelectedStrategies.size === 0) {
                container.append('<p class="text-center text-muted">No strategies selected for any ticker.</p>');
                return;
            }

            // Sort strategies nicely (you can customize order here)
            const strategyOrder = ['1Min-below_pmh', '1Min-vwap_crossover', '5Min-below_sma', '1Min-below_sma', '1Min-vwap_dev'];
            const sortedStrategies = Array.from(allSelectedStrategies).sort((a, b) => {
                const ia = strategyOrder.indexOf(a);
                const ib = strategyOrder.indexOf(b);
                return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
            });

            // Build one table per enabled strategy
            sortedStrategies.forEach(strategy => {
                const tickersForStrategy = [];

                Object.keys(data).sort().forEach(ticker => {
                    if (!tickerStrategies[ticker] || !tickerStrategies[ticker].includes(strategy)) return;
                    const strategyData = data[ticker][strategy];
                    if (!strategyData) return;

                    const stateClass = 
                        strategyData.state === 'SIGNAL_READY' ? 'state-ready' :
                        strategyData.state === 'SIGNAL_FIRED' ? 'state-fired' :
                        strategyData.state === 'CONDITION_NOT_MET' ? 'state-not-met' : '';

                    const row = {
                        ticker: ticker,
                        timestamp: strategyData.timestamp || 'N/A',
                        open: strategyData.open !== 'N/A' ? strategyData.open : '<span class="na">N/A</span>',
                        pmh: strategyData.pmh !== 'N/A' ? strategyData.pmh : '<span class="na">N/A</span>',
                        hod: strategyData.hod !== 'N/A' ? strategyData.hod : '<span class="na">N/A</span>',
                        hod_time: strategyData.hod_time !== 'N/A' ? strategyData.hod_time : '<span class="na">N/A</span>',
                        vwap: strategyData.vwap !== 'N/A' ? strategyData.vwap : '<span class="na">N/A</span>',
                        sma10: strategyData.sma10 !== 'N/A' ? strategyData.sma10 : '<span class="na">N/A</span>',
                        state: `<span class="${stateClass}">${strategyData.state}</span>`,
                        fired_signal: strategyData.fired_signal || '-',  // ← ADD THIS
                        signal_price: strategyData.signal_price !== '-' ? strategyData.signal_price : '-',
                        vwap_dev_pct: strategyData.vwap_dev_pct !== 'N/A' ? strategyData.vwap_dev_pct : 'N/A',
                        sma_dev_pct: strategyData.sma_dev_pct !== 'N/A' ? strategyData.sma_dev_pct : 'N/A'  // NEW
                    };
                    tickersForStrategy.push(row);
                });

                if (tickersForStrategy.length === 0) return;

                // Create table HTML
                let tableRows = '';
                
                tickersForStrategy.forEach(row => {
                    const firedClass = row.fired_signal !== '-' ? 'text-success font-weight-bold' : 'text-muted';
                    const devClass = 
                        row.vwap_dev_pct === 'N/A' ? '' :
                        row.vwap_dev_pct > 0 ? 'text-success' :
                        row.vwap_dev_pct < 0 ? 'text-danger' : '';
                    const devSmaClass = 
                        row.sma_dev_pct === 'N/A' ? '' :
                        row.sma_dev_pct > 0 ? 'text-success' :
                        row.sma_dev_pct < 0 ? 'text-danger' : '';    
                    tableRows += `
                        <tr class="ticker-row">
                            <td class="ticker-cell">${row.ticker}</td>
                            <td>${row.timestamp}</td>
                            <td>${row.open}</td>
                            <td>${row.pmh}</td>
                            <td>${row.hod !== 'N/A' ? `${row.hod} (${row.hod_time})` : '<span class="na">N/A</span>'}</td>
                            <td>${row.vwap}</td>
                            <td>${row.sma10}</td>
                            <td>${row.state}</td>
                            <td class="text-center ${firedClass}"><strong>${row.fired_signal}</strong></td>
                            <td class="text-center"><strong>${row.signal_price !== '-' ? row.signal_price.toFixed(2) : '-'}</strong></td>
                            <td class="text-center ${devClass}"><strong>${row.vwap_dev_pct}${row.vwap_dev_pct !== 'N/A' ? '%' : ''}</strong></td>
                            <td class="text-center ${devSmaClass}"><strong>${row.sma_dev_pct}${row.sma_dev_pct !== 'N/A' ? '%' : ''}</strong></td>
                        </tr>`;
                });

                const friendlyName = strategy
                    .replace('1Min-', '1m ')
                    .replace('5Min-', '5m ')
                    .replace('-', ' ')
                    .replace('pmh', 'PMH')
                    .replace('vwap', 'VWAP')
                    .replace('sma', 'SMA')
                    .toUpperCase();

                const tableHTML = `
                    <div class="strategy-table">
                        <div class="strategy-title">${friendlyName}</div>
                        <table class="table table-sm table-bordered table-hover">
                            <thead class="thead-dark">
                                <tr>
                                    <th>Ticker</th>
                                    <th>Time</th>
                                    <th>Open</th>
                                    <th>PMH</th>
                                    <th>HOD</th>
                                    <th>VWAP</th>
                                    <th>SMA10</th>
                                    <th>State</th>
                                    <th>Fired Signal</th>
                                    <th>Signal Price</th>
                                    <th>VWAP Dev %</th>
                                    <th>SMA Dev %</th>  <!-- NEW -->
                                </tr>
                            </thead>
                            <tbody>
                                ${tableRows}
                            </tbody>
                        </table>
                    </div>
                `;

                container.append(tableHTML);
            });
        });

        // Refresh every 5 seconds
        setInterval(() => {
            if (socket.connected) {
                socket.emit('request_candle_conditions');
            }
        }, 5000);
    </script>
</body>
</html>
